<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="logo">
          <!-- <img
            src="./assets/Task_Management_-_App_Icon_by_Henrik_Abonyi__-removebg-preview.png"
            alt=""
            width="60px"
          /> -->
          <i class="ri-remix-fill"></i>
          <div class="logo-name">
            <h1>MY WORK</h1>
          </div>
        </div>

        <div class="sidebar-nav">
          <button class="nav-button button-emerald">Dashboard</button>
          <button class="nav-button button-emerald">Todo List</button>
          <button class="nav-button button-emerald">Daily Planner</button>
          <button class="nav-button button-emerald">Daily Goals</button>
          <button class="nav-button button-emerald">Pomodoro Timer</button>
          <button class="nav-button button-emerald">Settings</button>
        </div>

        <!-- <div class="profile">
          <div class="avtar">
            <img src="./assets/download.jpg" alt="" width="200px" />
          </div>
          <h1>Utkarsh</h1>
        </div> -->
      </aside>

      <main class="main-content">
        <header class="header">
          <div class="header-left">
            <h1>Welcome, Utkarsh!👋</h1>
            <p>Let's make today productive and amazing</p>
          </div>

          <div class="header-center">
            <div class="search_container">
              <input type=" text" placeholder="Search anything.." />
              <i class="ri-search-ai-line"></i>
            </div>
          </div>

          <div class="header-right">
            <input type="checkbox" class="checkbox">
          </div>
        </header>

        <section class="dashboard">
          
            <div class="total-tasks">Total tasks</div>
            <div class="completed-tasks">Completed</div>
            <div class="Active-goals">Active Goals</div>
            <div class="focus-time">focus Time</div>
            <div class="weather-div">Weather,Date&Time</div>
            <div class="profile">profile</div>

            <div class="dashboard-todo-card">Todo</div>
            <div class="dashboard-planner-card">planner</div>
            <div class="dashboard-motivation-card">Motivation</div>
            <div class="dashboard-pomodoro-card">pomodoro</div>
            <div class="dashboard-goals-card">Goals</div>
         

          <!-- <div class="bottom-grid"></div> -->
        </section>

        <section class="todo-page">
          <div class="page-header"></div>

          <div class="task-controls"></div>

          <div class="task-list"></div>
        </section>

        <section class="planner-page">
          <div class="page-header"></div>

          <div class="planner-container"></div>
        </section>

        <section class="goals-page">
          <div class="page-header"></div>

          <div class="goal-container"></div>
        </section>

        <section class="pomodoro-page">
          <div class="page-header"></div>

          <div class="timer-container"></div>
        </section>

        <section class="settings-page">
          <div class="page-header"></div>

          <div class="settings-container"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
